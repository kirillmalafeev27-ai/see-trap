<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student - German Sea Trap</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <section class="card header">
      <div>
        <h1 class="h-title">German Sea Trap</h1>
        <div class="muted">Клиентский режим: только игра и ввод предложения.</div>
      </div>
      <div class="header-actions">
        <div class="muted" id="roleText">Роль: ученик</div>
        <button id="restartStudentBtn">Перезапуск</button>
      </div>
    </section>

    <section class="layout-student">
      <section class="left-col">
        <div class="card board-wrap">
          <div id="board" class="board" aria-label="Игровое поле"></div>
        </div>

        <div class="card panel">
          <div class="label">Фаза</div>
          <div id="phaseText" class="value"></div>
          <div id="instructionText" class="muted" style="margin-top:6px"></div>
        </div>

        <div class="card panel">
          <div class="label">Слова в нужном порядке</div>
          <div id="requiredWords" class="chips"></div>

          <div style="margin-top:8px" class="label">Ваше предложение</div>
          <textarea id="sentenceInput" rows="3" placeholder="Можно оставить пустым или написать предложение"></textarea>

          <div class="row" style="margin-top:8px">
            <button id="sendSentenceBtn">Отправить учителю</button>
            <button id="virtualCheckBtn">Проверить виртуальным учителем</button>
          </div>

          <div style="margin-top:8px" class="label">Обратная связь</div>
          <div id="feedbackBox" class="feedback muted">Ожидание хода.</div>
        </div>
      </section>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/common.js"></script>
  <script src="/student.js"></script>
</body>
</html>
